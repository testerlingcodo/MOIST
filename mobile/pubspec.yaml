name: sis_portal_mobile
description: Student Information System Portal - Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.7
  provider: ^6.1.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
